<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        .otp-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: center;
        }

        .otp-input {
            letter-spacing: 10px;
            font-size: 24px;
            text-align: center;
        }

        .btn-custom {
            background-color: #4facfe;
            color: white;
        }

        .btn-custom:hover {
            background-color: #007bff;
        }
    </style>
</head>

<body>

    <div class="otp-box">
        <h3 class="mb-3">OTP Verification</h3>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <ul class=flashes>
            {% for message in messages %}
            <li>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="otp" class="form-control otp-input mb-3" placeholder="------" required>

            <button type="submit" class="btn btn-custom w-100">
                Verify OTP
            </button>
        </form>


</body>

</html>
